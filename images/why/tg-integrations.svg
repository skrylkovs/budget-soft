<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220">
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fccff"/>
      <stop offset=".45" stop-color="#4aa3ec"/>
      <stop offset=".55" stop-color="#2478cc"/>
      <stop offset="1" stop-color="#0d4a94"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a5f"/>
      <stop offset=".25" stop-color="#12233a"/>
      <stop offset="1" stop-color="#0c1622"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- тень под композицией -->
  <ellipse cx="150" cy="204" rx="110" ry="8" fill="#0a1420" opacity=".16" filter="url(#soft)"/>

  <!-- линии-связи (глянцевые кабели) -->
  <g fill="none" stroke-linecap="round">
    <g stroke="#0a2a4d" stroke-width="9">
      <path d="M150 102 Q112 88 78 52"/>
      <path d="M150 102 Q196 84 242 46"/>
      <path d="M150 102 Q110 126 76 160"/>
      <path d="M150 102 Q194 130 226 160"/>
    </g>
    <g stroke="#2478cc" stroke-width="4">
      <path d="M150 102 Q112 88 78 52"/>
      <path d="M150 102 Q196 84 242 46"/>
      <path d="M150 102 Q110 126 76 160"/>
      <path d="M150 102 Q194 130 226 160"/>
    </g>
  </g>

  <!-- пакеты данных на линиях -->
  <g stroke="#0a2a4d" stroke-width="2.5">
    <circle cx="99" cy="72" r="6" fill="url(#gloss)"/>
    <circle cx="206" cy="142" r="6" fill="url(#gloss)"/>
  </g>

  <!-- узел 1С -->
  <g>
    <rect x="13" y="21" width="76" height="50" rx="13" fill="#0a2a4d"/>
    <rect x="10" y="18" width="76" height="50" rx="13" fill="url(#navy)"/>
    <rect x="10" y="18" width="76" height="26" rx="13" fill="url(#shine)" opacity=".35"/>
    <text x="48" y="55" text-anchor="middle" font-family="Arial, 'Segoe UI', sans-serif"
          font-weight="900" font-size="32" fill="#fff">1С</text>
  </g>

  <!-- узел CRM -->
  <g>
    <rect x="197" y="17" width="100" height="50" rx="13" fill="#0a2a4d"/>
    <rect x="194" y="14" width="100" height="50" rx="13" fill="url(#navy)"/>
    <rect x="194" y="14" width="100" height="26" rx="13" fill="url(#shine)" opacity=".35"/>
    <text x="244" y="51" text-anchor="middle" font-family="Arial, 'Segoe UI', sans-serif"
          font-weight="900" font-size="30" fill="#fff">CRM</text>
  </g>

  <!-- узел ₽ (платежи) -->
  <g>
    <rect x="17" y="141" width="62" height="54" rx="13" fill="#0a2a4d"/>
    <rect x="14" y="138" width="62" height="54" rx="13" fill="url(#navy)"/>
    <rect x="14" y="138" width="62" height="28" rx="13" fill="url(#shine)" opacity=".35"/>
    <text x="45" y="179" text-anchor="middle" font-family="Arial, 'Segoe UI', sans-serif"
          font-weight="900" font-size="36" fill="#fff">₽</text>
  </g>

  <!-- узел API (шестерёнка) -->
  <g>
    <rect x="217" y="141" width="72" height="56" rx="13" fill="#0a2a4d"/>
    <rect x="214" y="138" width="72" height="56" rx="13" fill="url(#navy)"/>
    <rect x="214" y="138" width="72" height="28" rx="13" fill="url(#shine)" opacity=".35"/>
    <g transform="translate(250 166)">
      <g fill="#cfe6fb">
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(45)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(90)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(135)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(180)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(225)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(270)"/>
        <rect x="-4.5" y="-22" width="9" height="11" rx="2.5" transform="rotate(315)"/>
        <circle r="15"/>
      </g>
      <circle r="6.5" fill="#12233a"/>
    </g>
  </g>

  <!-- хаб: медальон с самолётиком Telegram -->
  <g>
    <circle cx="154" cy="106" r="47" fill="#0a2a4d"/>
    <circle cx="150" cy="102" r="47" fill="url(#gloss)" stroke="#0a2a4d" stroke-width="3.5"/>
    <circle cx="150" cy="102" r="40" fill="none" stroke="#fff" stroke-opacity=".3" stroke-width="1.5"/>
    <path d="M103 102 a47 47 0 0 1 94 0 z" fill="url(#shine)"/>
    <!-- бумажный самолётик -->
    <g>
      <polygon points="183,80 115,107 149,118" fill="#fff"/>
      <polygon points="183,80 149,118 163,124" fill="#dcecfb"/>
      <polygon points="149,118 147,137 160,123" fill="#b7d9f6"/>
    </g>
  </g>
</svg>
