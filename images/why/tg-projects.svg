<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220">
  <defs>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fccff"/>
      <stop offset=".45" stop-color="#4aa3ec"/>
      <stop offset=".55" stop-color="#2478cc"/>
      <stop offset="1" stop-color="#0d4a94"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d3a5f"/>
      <stop offset=".25" stop-color="#12233a"/>
      <stop offset="1" stop-color="#0c1622"/>
    </linearGradient>
    <linearGradient id="wingDeep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f86d6"/>
      <stop offset="1" stop-color="#0d4a94"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-120%" width="160%" height="340%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- тень под композицией -->
  <ellipse cx="140" cy="203" rx="112" ry="9" fill="#0a1420" opacity=".16" filter="url(#soft)"/>

  <!-- шлейф самолётика (за цифрами) -->
  <path d="M18 72 C 62 30, 152 4, 220 28" fill="none" stroke="#cfe6fb"
        stroke-width="6" stroke-linecap="round" opacity=".85"/>
  <path d="M30 84 C 70 46, 150 18, 212 38" fill="none" stroke="#4aa3ec"
        stroke-width="3.5" stroke-linecap="round" stroke-dasharray="14 12" opacity=".7"/>

  <!-- силуэт-«скайлайн»: смартфоны и облачка чата -->
  <g>
    <!-- линия земли -->
    <rect x="24" y="193" width="232" height="4.5" rx="2.25" fill="#0c1622"/>
    <!-- смартфон слева -->
    <rect x="30" y="138" width="42" height="57" rx="8" fill="url(#navy)"/>
    <rect x="42" y="144" width="18" height="3" rx="1.5" fill="#4aa3ec" opacity=".8"/>
    <rect x="36" y="154" width="20" height="7" rx="3.5" fill="#4aa3ec"/>
    <rect x="44" y="166" width="22" height="7" rx="3.5" fill="#cfe6fb"/>
    <rect x="43" y="186" width="16" height="3" rx="1.5" fill="#4aa3ec" opacity=".5"/>
    <!-- облачко чата — «здание» в центре -->
    <path d="M84 144 a12 12 0 0 1 12 -12 h30 a12 12 0 0 1 12 12 v51 h-54 z" fill="url(#navy)"/>
    <rect x="92" y="144" width="26" height="7" rx="3.5" fill="#cfe6fb"/>
    <rect x="92" y="156" width="36" height="7" rx="3.5" fill="#4aa3ec"/>
    <rect x="92" y="168" width="20" height="7" rx="3.5" fill="#4aa3ec" opacity=".65"/>
    <!-- смартфон правее центра -->
    <rect x="150" y="146" width="40" height="49" rx="8" fill="url(#navy)"/>
    <rect x="161" y="151" width="18" height="3" rx="1.5" fill="#4aa3ec" opacity=".8"/>
    <rect x="156" y="161" width="24" height="7" rx="3.5" fill="#cfe6fb"/>
    <rect x="162" y="173" width="22" height="7" rx="3.5" fill="#4aa3ec"/>
    <!-- облачко «печатает…» справа -->
    <path d="M202 160 a10 10 0 0 1 10 -10 h30 a10 10 0 0 1 10 10 v18 a10 10 0 0 1 -10 10 h-30 a10 10 0 0 1 -10 -10 z" fill="url(#navy)"/>
    <polygon points="236,186 250,196 222,186" fill="#0c1622"/>
    <circle cx="216" cy="169" r="4" fill="#cfe6fb"/>
    <circle cx="228" cy="169" r="4" fill="#4aa3ec"/>
    <circle cx="240" cy="169" r="4" fill="#4aa3ec" opacity=".55"/>
  </g>

  <!-- 60+ : псевдо-3D тёмная подложка + глянец + блик -->
  <g font-family="Arial, 'Segoe UI', sans-serif" font-weight="900" text-anchor="middle">
    <text x="121.5" y="102.5" font-size="96" fill="#0a2a4d">60+</text>
    <text x="118" y="98" font-size="96" fill="url(#gloss)" stroke="#0a2a4d" stroke-width="2" paint-order="stroke fill">60+</text>
    <text x="118" y="98" font-size="96" fill="url(#shine)">60+</text>
  </g>

  <!-- 17 лет -->
  <g font-family="Arial, 'Segoe UI', sans-serif" font-weight="900" text-anchor="middle">
    <text x="212" y="133" font-size="37" fill="#0a2a4d">17 лет</text>
    <text x="210" y="131" font-size="37" fill="url(#gloss)" stroke="#0a2a4d" stroke-width="1.5" paint-order="stroke fill">17 лет</text>
    <text x="210" y="131" font-size="37" fill="url(#shine)">17 лет</text>
  </g>

  <!-- бумажный самолётик -->
  <g transform="translate(264,25) rotate(-14) scale(1.08)">
    <polygon points="0,0 -44,-16 -30,-1" fill="url(#gloss)" stroke="#0a2a4d" stroke-width="2.4" stroke-linejoin="round"/>
    <polygon points="0,0 -30,-1 -38,14" fill="url(#wingDeep)" stroke="#0a2a4d" stroke-width="2.4" stroke-linejoin="round"/>
    <polygon points="-30,-1 -38,14 -27,5" fill="#0d4a94" stroke="#0a2a4d" stroke-width="1.6" stroke-linejoin="round"/>
    <polygon points="0,0 -44,-16 -30,-1" fill="url(#shine)"/>
  </g>
</svg>
