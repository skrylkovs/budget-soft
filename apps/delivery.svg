<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" fill="none" role="img" aria-label="Интерфейс приложения доставки с картой">
  <defs>
    <linearGradient id="delBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4ea8ff"/>
      <stop offset="1" stop-color="#6f4cff"/>
    </linearGradient>
  </defs>
  <rect width="440" height="180" fill="url(#delBg)"/>
  <!-- map streets -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.18">
    <line x1="0" y1="56" x2="440" y2="40"/>
    <line x1="0" y1="104" x2="440" y2="120"/>
    <line x1="120" y1="0" x2="100" y2="180"/>
    <line x1="300" y1="0" x2="320" y2="180"/>
  </g>
  <!-- route -->
  <path d="M64 46C150 60 150 116 244 104S360 64 392 112" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 9" fill="none"/>
  <circle cx="64" cy="46" r="8" fill="#fff"/>
  <circle cx="64" cy="46" r="3.5" fill="#4ea8ff"/>
