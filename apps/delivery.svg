  <path d="M392 96c-9 0-16 7-16 16 0 11 16 22 16 22s16-11 16-22c0-9-7-16-16-16z" fill="#fff"/>
  <circle cx="392" cy="112" r="6" fill="#6f4cff"/>
  <!-- order card -->
  <rect x="24" y="120" width="392" height="44" rx="13" fill="#ffffff"/>
  <rect x="36" y="132" width="22" height="22" rx="7" fill="#6f4cff"/>
  <rect x="70" y="132" width="120" height="7" rx="3.5" fill="#0a0a14"/>
  <rect x="70" y="145" width="80" height="5" rx="2.5" fill="#9aa"/>
  <rect x="250" y="133" width="154" height="8" rx="4" fill="#eef0f6"/>
  <rect x="250" y="133" width="104" height="8" rx="4" fill="#22c55e"/>
  <rect x="250" y="148" width="60" height="5" rx="2.5" fill="#9aa"/>
</svg>
