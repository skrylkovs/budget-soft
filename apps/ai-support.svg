<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" fill="none" role="img" aria-label="Интерфейс чата AI-поддержки">
  <defs>
    <linearGradient id="aiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f4cff"/>
      <stop offset="1" stop-color="#b14bff"/>
    </linearGradient>
  </defs>
  <rect width="440" height="180" fill="url(#aiBg)"/>
  <circle cx="60" cy="40" r="46" fill="#ffffff" opacity="0.07"/>
  <circle cx="392" cy="150" r="60" fill="#ffffff" opacity="0.06"/>
  <!-- chat window -->
  <rect x="44" y="22" width="352" height="136" rx="16" fill="#ffffff"/>
  <!-- header -->
  <circle cx="70" cy="48" r="11" fill="#6f4cff"/>
  <path d="M66 48a4 4 0 118 0 4 4 0 01-8 0z" fill="#fff"/>
  <rect x="89" y="42" width="92" height="7" rx="3.5" fill="#0a0a14"/>
  <rect x="89" y="53" width="54" height="5" rx="2.5" fill="#9aa"/>
  <circle cx="372" cy="48" r="4" fill="#22c55e"/>
  <line x1="44" y1="70" x2="396" y2="70" stroke="#eef0f6" stroke-width="1.5"/>
  <!-- incoming bubble -->
  <rect x="60" y="82" width="150" height="24" rx="12" fill="#f1eefe"/>
  <rect x="72" y="91" width="120" height="6" rx="3" fill="#6f4cff" opacity="0.55"/>
  <!-- AI reply -->
  <rect x="196" y="112" width="184" height="34" rx="13" fill="#6f4cff"/>
  <rect x="208" y="121" width="150" height="6" rx="3" fill="#ffffff" opacity="0.95"/>
  <rect x="208" y="132" width="96" height="6" rx="3" fill="#ffffff" opacity="0.7"/>
