name: IndexNow ping

# Уведомляет Яндекс (и Bing/Seznam через общий эндпоинт) о новых и изменённых
# страницах сразу после публикации.
#
# Почему это нужно: Яндекс перечитывает sitemap неделями — в июле 2026 файл
# провисел в очереди на переобход с 07.07 по 19.07, из-за чего поисковик знал
# 26 URL вместо 133. Ручной «Переобход страниц» в Вебмастере ограничен
# 150 адресами в сутки.
#
# Триггер page_build срабатывает ПОСЛЕ того, как GitHub Pages опубликовал
# сборку, — то есть роботы придут уже на новый контент, а не на старый.
# Запуск вручную (workflow_dispatch) оставлен для отправки без деплоя.
#
# Ключ IndexNow публичен по своей природе: он лежит в корне сайта файлом
# <ключ>.txt, и именно так поисковик подтверждает владение доменом.
# Прятать его в секреты смысла нет.

on:
  page_build:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Проверить, что ключевой файл опубликован
        run: |
          KEY=24998a1f02ad5271e85b130b3a22a445
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.budget-soft.ru/$KEY.txt")
          if [ "$CODE" != "200" ]; then
            echo "Ключевой файл недоступен (HTTP $CODE) — IndexNow ответит 403."
            echo "Проверь https://www.budget-soft.ru/$KEY.txt"
            exit 1
          fi
          echo "Ключевой файл на месте (HTTP 200)"

      - name: Отправить URL из sitemap.xml
        run: python _indexnow_ping.py
